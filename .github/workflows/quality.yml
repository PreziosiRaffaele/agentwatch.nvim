name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  stylua:
    name: Stylua
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Stylua
        run: |
          cargo install stylua --locked

      - name: Check formatting
        run: |
          stylua --check .
