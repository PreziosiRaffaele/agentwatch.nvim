name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck
          cargo install stylua --locked

      - name: Check
        run: |
          make quality
